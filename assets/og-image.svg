<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='630' viewBox='0 0 1200 630'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' stop-color='#0d0d1a'/>
      <stop offset='50%' stop-color='#12082e'/>
      <stop offset='100%' stop-color='#0d0d1a'/>
    </linearGradient>
    <linearGradient id='accent' x1='0%' y1='0%' x2='100%' y2='0%'>
      <stop offset='0%' stop-color='#00d4ff'/>
      <stop offset='100%' stop-color='#7b2ff7'/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width='1200' height='630' fill='url(#bg)'/>

  <!-- Decorative circles -->
  <circle cx='950' cy='120' r='200' fill='none' stroke='#7b2ff7' stroke-width='1' opacity='0.3'/>
  <circle cx='950' cy='120' r='140' fill='none' stroke='#00d4ff' stroke-width='1' opacity='0.2'/>
  <circle cx='200' cy='520' r='150' fill='none' stroke='#e040fb' stroke-width='1' opacity='0.15'/>

  <!-- Accent line -->
  <rect x='80' y='310' width='200' height='3' fill='url(#accent)' rx='2'/>

  <!-- Main title -->
  <text x='80' y='220' font-family='Arial Black, Arial, sans-serif' font-weight='900' font-size='72' fill='white' letter-spacing='-1'>Cyber Aspis</text>
  <text x='80' y='295' font-family='Arial Black, Arial, sans-serif' font-weight='900' font-size='72' fill='url(#accent)' letter-spacing='-1'>IT-Security</text>

  <!-- Tagline -->
  <text x='80' y='370' font-family='Arial, sans-serif' font-size='28' fill='#a0a0c0' letter-spacing='0.5'>IT-Sicherheit für KMU — Made in Germany</text>

  <!-- Services -->
  <text x='80' y='450' font-family='Arial, sans-serif' font-size='22' fill='#00d4ff'>✦ Penetrationstests</text>
  <text x='320' y='450' font-family='Arial, sans-serif' font-size='22' fill='#7b2ff7'>✦ Vulnerability Assessments</text>
  <text x='680' y='450' font-family='Arial, sans-serif' font-size='22' fill='#e040fb'>✦ Security-Beratung</text>

  <!-- Domain -->
  <text x='80' y='540' font-family='Arial, sans-serif' font-size='26' fill='white' opacity='0.6'>cyber-aspis.de</text>

  <!-- Shield icon (simple) -->
  <path d='M1060 180 L1100 200 L1100 260 Q1100 300 1060 320 Q1020 300 1020 260 L1020 200 Z' fill='none' stroke='url(#accent)' stroke-width='3' opacity='0.6'/>
  <text x='1048' y='262' font-family='Arial, sans-serif' font-size='36' fill='url(#accent)' opacity='0.8'>🛡</text>
</svg>
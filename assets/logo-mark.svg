<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Cyber Aspis Mark">
  <!-- Aspis-Seal · Greek Aspis (Hoplit-Schild) + Dory (Speer) mit zentralem A-Emblem.
       Konzept-Sketch, Stand 2026-05-12. Production-Quality via externer Designer geplant. -->

  <!-- Speer (vertikal, hinter und durch Schild) -->
  <line x1="32" y1="58" x2="32" y2="8" stroke="#3a2e26" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Speer-Spitze (Leaf) oben -->
  <path fill="#3a2e26" d="M 32 4 L 27 14 L 32 12 L 37 14 Z"/>
  <!-- Butt-Spike unten -->
  <rect x="29" y="58" width="6" height="3" fill="#3a2e26"/>

  <!-- Aspis-Schild · outlined ring (hohl) -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#3a2e26" stroke-width="3"/>
  <!-- Subtle innerer Rim -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#3a2e26" stroke-width="0.8" opacity="0.4"/>

  <!-- Zentrales A-Emblem (~20% größer als Konzept-v1, 2026-05-12) -->
  <path fill="#3a2e26" fill-rule="evenodd" d="
    M 32 20
    L 22 44
    L 26 44
    L 28 39
    L 36 39
    L 38 44
    L 42 44
    Z
    M 30 35
    L 34 35
    L 32 30
    Z
  "/>
</svg>

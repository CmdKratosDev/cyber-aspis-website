server {
    listen 80;
    server_name _ cyber-aspis.de www.cyber-aspis.de;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers (OWASP Baseline) ────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                            always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"                    always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"           always;

    # CSP: Eigene Ressourcen + Google Fonts CDN
    # TODO: Wenn Fonts lokal eingebunden (assets/fonts/) → Google-Domains aus CSP entfernen
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self';" always;

    # HSTS: Erst einkommentieren NACHDEM HTTPS läuft!
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Static Files ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # favicon ohne 404-Logging
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }

    # robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log    off;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types      text/html text/css text/javascript application/javascript
                    image/svg+xml font/woff2;

    # ── Cache-Control für Assets ───────────────────────────────────────────────
    location ~* \.(woff2|woff|ttf|png|ico|svg|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
    }
}

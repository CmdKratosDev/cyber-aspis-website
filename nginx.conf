server {
    listen 80;
    server_name _ cyber-aspis.de www.cyber-aspis.de;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers (OWASP Baseline) ────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                            always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"                    always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"           always;

    # CSP: connect-src erlaubt externe APIs für Threat-Feed + /api/contact intern
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self' https://hn.algolia.com; object-src 'none'; base-uri 'self';" always;

    # HSTS aktiv (HTTPS läuft stabil)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Static Files ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # favicon ohne 404-Logging
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }

    # robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log    off;
    }

    # ── CISA KEV Proxy (kein CORS-Header bei CISA → same-origin Proxy) ───────
    location /api/cisa-kev {
        proxy_pass https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json;
        proxy_ssl_server_name on;
        resolver 8.8.8.8 valid=300s;
        resolver_timeout 5s;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
        add_header Cache-Control "public, max-age=600";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── n8n Kontaktformular Proxy (CORS-frei, intern über Docker-Netzwerk) ────
    location /api/contact {
        # OPTIONS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "$http_origin" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS"  always;
            add_header Access-Control-Allow-Headers "Content-Type"   always;
            return 204;
        }

        proxy_pass         http://n8n:5678/webhook/contact;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout    15s;
        add_header Access-Control-Allow-Origin "$http_origin" always;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types      text/html text/css text/javascript application/javascript
                    image/svg+xml font/woff2;

    # ── Cache-Control für Assets ───────────────────────────────────────────────
    location ~* \.(woff2|woff|ttf|png|ico|svg|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
    }
}

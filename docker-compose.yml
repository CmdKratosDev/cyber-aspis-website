services:
  web:
    image: nginx:alpine
    container_name: cyber-aspis-website
    expose:
      - "80"
    restart: unless-stopped
    # Beim Start: Dateien von GitHub klonen und nginx starten
    entrypoint: >
      sh -c "
        apk add --no-cache git &&
        git clone --depth 1 https://github.com/CmdKratosDev/cyber-aspis-website.git /tmp/ca-repo &&
        cp /tmp/ca-repo/nginx.conf /etc/nginx/conf.d/default.conf &&
        cp /tmp/ca-repo/index.html /usr/share/nginx/html/index.html &&
        cp -r /tmp/ca-repo/assets /usr/share/nginx/html/assets &&
        rm -rf /tmp/ca-repo &&
        nginx -g 'daemon off;'
      "
    labels:
      - traefik.enable=true
      - traefik.http.routers.cyberaspis.rule=Host(`cyber-aspis.de`) || Host(`www.cyber-aspis.de`)
      - traefik.http.routers.cyberaspis.entrypoints=websecure
      - traefik.http.routers.cyberaspis.tls=true
      - traefik.http.routers.cyberaspis.tls.certresolver=mytlschallenge
      - traefik.http.services.cyberaspis.loadbalancer.server.port=80
      # www → apex redirect
      - traefik.http.middlewares.cyberaspis-www.redirectregex.regex=^https://www\.cyber-aspis\.de/(.*)
      - traefik.http.middlewares.cyberaspis-www.redirectregex.replacement=https://cyber-aspis.de/$${1}
      - traefik.http.middlewares.cyberaspis-www.redirectregex.permanent=true
      - traefik.http.routers.cyberaspis.middlewares=cyberaspis-www@docker
    networks:
      - traefik_net
    depends_on:
      - php

  php:
    image: php:8.3-fpm-alpine
    container_name: cyber-aspis-php
    restart: unless-stopped
    # Beim Start: contact.php von GitHub klonen, PHPMailer installieren
    entrypoint: >
      sh -c "
        apk add --no-cache git unzip curl &&
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
        git clone --depth 1 https://github.com/CmdKratosDev/cyber-aspis-website.git /tmp/ca-repo &&
        mkdir -p /var/www/html &&
        cp /tmp/ca-repo/contact.php /var/www/html/contact.php &&
        cp /tmp/ca-repo/composer.json /var/www/html/composer.json &&
        rm -rf /tmp/ca-repo &&
        cd /var/www/html &&
        composer install --no-dev --optimize-autoloader --no-interaction &&
        php-fpm
      "
    environment:
      - SMTP_PASS=${SMTP_PASS}
    networks:
      - traefik_net

networks:
  traefik_net:
    external: true
    name: n8n_default
